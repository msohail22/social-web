name: Deploy API

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      API_FRONTEND_ORIGIN: ${{ secrets.API_FRONTEND_ORIGIN }}
      API_SESSION_TTL_DAYS: ${{ secrets.API_SESSION_TTL_DAYS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Set API secrets
        run: |
          cd apps/api
          printf "%s" "$API_FRONTEND_ORIGIN" | wrangler secret put FRONTEND_ORIGIN
          printf "%s" "$API_SESSION_TTL_DAYS" | wrangler secret put SESSION_TTL_DAYS

      - name: Apply D1 migrations
        run: cd apps/api && wrangler d1 migrations apply social_web --remote

      - name: Deploy API
        run: pnpm -C apps/api run deploy
